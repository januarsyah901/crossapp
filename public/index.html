<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleX - Twitter Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="container">
        <header>
            <div class="logo">
                <svg viewBox="0 0 24 24" aria-hidden="true" class="twitter-icon"><g><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></g></svg>
                <h1>SimpleX</h1>
            </div>
            <p class="subtitle">Twitter Read & Write Dashboard</p>
        </header>

        <main>
            <section class="compose-section">
                <div class="card">
                    <textarea id="tweet-input" placeholder="What's happening?" maxlength="280"></textarea>
                    <div class="card-footer">
                        <span id="char-count">0/280</span>
                        <button id="tweet-btn" class="primary-btn">Tweet</button>
                    </div>
                </div>
            </section>

            <section class="feed-section">
                <div class="feed-header">
                    <h2>Recent Tweets</h2>
                    <button id="refresh-btn" class="secondary-btn">
                        <svg class="refresh-icon" viewBox="0 0 24 24"><path d="M12 2c5.52 0 10 4.48 10 10s-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2zm0 2c-4.41 0-8 3.59-8 8s3.59 8 8 8 8-3.59 8-8-3.59-8-8-8zm5 11h-2v2h-2v-2h-2v-2h2v-2h2v2h2v2z"/></svg>
                        Refresh
                    </button>
                </div>
                <div id="tweet-list" class="tweet-list">
                    <div class="loader">Loading tweets...</div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 SimpleX powered by Bang Jan</p>
        </footer>
    </div>

    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
